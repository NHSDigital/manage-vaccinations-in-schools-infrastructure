name: Tear down non-production infrastructure
run-name: Removing AWS reasources for ${{ inputs.environment }}
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to be Destroyed"
        required: true
        type: choice
        options:
          - sandbox-alpha
          - sandbox-beta
          - pentest
env:
  environment: ${{ inputs.environment }}
  aws_role: arn:aws:iam::393416225559:role/GithubDeployMavisAndInfrastructure
permissions: {}
jobs:
  destroy-resources:
    name: Destroy resources
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.1.0
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@cabfdba3510de1431bac9dba27511d97497fc100 # v5.1.0
        with:
          role-to-assume: ${{ env.aws_role }}
          aws-region: eu-west-2
      - name: Install terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.0.0
        with:
          terraform_version: 1.13.3
      - name: Ensure DB cluster can be deleted
        run: |
          set -e
          terraform init -backend-config="env/$environment-backend.hcl" -upgrade
          if terraform state list | grep -q 'aws_rds_cluster.core'; then
            echo "DB cluster exists: removing delete protection"
            aws rds modify-db-cluster --db-cluster-identifier "mavis-$environment-core" --no-deletion-protection
            echo "DB cluster delete protection removed: proceeding to delete stage"
          else
            echo "DB cluster not in state: proceeding to delete stage"
          fi
      - name: Delete cluster
        run: |
          set -e
          terraform destroy -var-file="env/$environment.tfvars" \
          -var="image_digest=notneededfordestroy" -auto-approve
  destroy-backend:
    name: Destroy backend
    runs-on: ubuntu-latest
    needs: destroy-resources
    permissions:
      id-token: write
    environment: ${{ inputs.environment }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.aws_role }}
          aws-region: eu-west-2
      - name: Delete terraform backend elements
        run: |
          set -e
          TF_STATE_FILE="nhse-mavis-terraform-state/terraform-$environment.tfstate"
          aws s3 rm "s3://$TF_STATE_FILE"
