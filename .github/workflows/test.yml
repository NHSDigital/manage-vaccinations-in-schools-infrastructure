name: Test
on:
  pull_request:
  workflow_call:
permissions: {}
jobs:
  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        working-directory:
          - ./account
          - ./app
          - ./assurance_testing
          - ./data_replication
          - ./monitoring/aws
          - ./monitoring/grafana
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.1.0
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.0.0
        with:
          terraform_version: 1.13.3
      - name: Terraform validate ${{ matrix.working-directory }}
        working-directory: ${{ matrix.working-directory }}
        run: |-
          terraform init -backend=false
          terraform validate
